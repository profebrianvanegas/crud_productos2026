<div class="flex-1 overflow-y-auto p-4 md:p-8 scroll-smooth">
    <div class="max-w-7xl mx-auto flex flex-col gap-4">

        <div class="flex flex-col md:flex-row md:items-end justify-between gap-3">
            <div>
                <h1 class="text-3xl font-bold text-slate-900">Crear nueva categoria</h1>
                <p class="text-slate-600">Agrega nuevas categorias de productos al inventario</p>
            </div>
            <div class="flex gap-4">
                <p-button label="Cancelar" [raised]="true" severity="secondary" [routerLink]="['/admin/lista-productos']" />
                <p-button label="Guardar Categoria" [raised]="true" severity="primary" icon="pi pi-save" />
            </div>
        </div>

        <div class="grid lg:grid-cols-3 sm:grid-cols-1 gap-4">
            <section class="col-span-2 bg-surface-100 p-6 rounded-xl border border-surface-300 shadow-sm">
                <h3 class="text-lg font-bold mb-4">
                    <span class="pi pi-info-circle text-blue-600 mr-1"></span>
                    Información General
                </h3>

                <div class="grid grid-col-1 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-600 mb-1">Nombre de la Categoria</label>
                        <input pInputText id="over_label" autocomplete="off" class="w-full" />
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-600 mb-1">Description</label>
                        <textarea rows="5" cols="30" pTextarea fluid></textarea>
                    </div>




                </div>
            </section>

            <section class="bg-surface-100 p-6 rounded-xl border border-surface-300 shadow-sm">
                <h3 class="text-lg font-bold mb-4">
                    <span class="pi pi-sitemap text-blue-600 mr-1"></span>
                    Organización
                </h3>

                <div class="grid lg:grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-600 mb-1">Categoria Padre</label>
                        <p-select [options]="" optionLabel="name" placeholder="Selecciona un categoria"
                            class="w-full" appendTo="body" />
                    </div>
                </div>
            </section>
        </div>
    </div>
</div>
